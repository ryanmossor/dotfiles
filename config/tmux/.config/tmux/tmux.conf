# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf

# Copy mode controls
bind -n M-c copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Prevent pane from snapping to bottom when highlighting w/ mouse in scrollback mode
unbind -T copy-mode-vi MouseDragEnd1Pane

# Pane Controls
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-h split-window -v -c "#{pane_current_path}"
# bind End kill-pane

bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-b     select-pane -L # M-Left activates this since M-Left sends ^[b
bind -n M-f     select-pane -R # M-Right activates this since M-Right sends ^[f

bind -n M-S-Left  resize-pane -L 3
bind -n M-S-Down  resize-pane -D 3
bind -n M-S-Up    resize-pane -U 3
bind -n M-S-Right resize-pane -R 3

# Window navigation
# bind r command-prompt -I "#W" "rename-window -- '%%'"
bind -n M-t new-window -a -c "#{pane_current_path}"
bind x kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

bind -n M-Tab next-window
# Equivalent to M-Shift-Tab: https://github.com/tmux/tmux/wiki/Modifier-Keys#how-tmux-describes-keys-with-modifiers
bind -n M-BTab previous-window

# Session controls
bind X kill-session
# bind R command-prompt -I "#S" "rename-session -- '%%'"
# bind P switch-client -p
# bind N switch-client -n

# Switch to other active session with fzf
bind s display-popup -E "tmux list-sessions -F '#{session_name}' \
    | fzf --reverse --header 'Switch session' \
    | xargs tmux switch-client -t"

bind -n C-f display-popup -w 75% -h 75% -b none -E "~/.local/scripts/tmux-dispensary"
bind k display-popup -E "~/.local/scripts/tmux-kill"

# Display custom tmux keybinds
bind K display-popup -w 75% -h 75% -E "grep ^bind ~/.config/tmux/tmux.conf | fzf"

bind g display-popup -y S -w 98% -h 95% -b rounded -d "#{pane_current_path}" -E "lazygit"

# Display env vars
bind e show-environment -g

# General
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=#181826,bg=blue,bold] #{session_name} #[bg=default] "
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#[fg=brightblack]#{host_short} "
set -g window-status-format "#[fg=brightblack] #{window_index}:#{window_name} "
set -g window-status-current-format "#[fg=blue,bold] #{window_index}:#{window_name} "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "reverse"
setw -g clock-mode-colour blue
